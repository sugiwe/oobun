ja:
  # 日時フォーマット
  time:
    formats:
      default: "%Y/%m/%d %H:%M"
      short: "%m/%d %H:%M"
      long: "%Y年%m月%d日 %H時%M分"
  date:
    formats:
      default: "%Y/%m/%d"
      short: "%m/%d"
      long: "%Y年%m月%d日"

  # 日時の距離表現（time_ago_in_words用）
  datetime:
    distance_in_words:
      about_x_hours:
        one: 約1時間
        other: 約%{count}時間
      about_x_months:
        one: 約1ヶ月
        other: 約%{count}ヶ月
      about_x_years:
        one: 約1年
        other: 約%{count}年
      almost_x_years:
        one: 1年弱
        other: "%{count}年弱"
      half_a_minute: 30秒
      less_than_x_seconds:
        one: 1秒以内
        other: "%{count}秒未満"
      less_than_x_minutes:
        one: 1分以内
        other: "%{count}分未満"
      over_x_years:
        one: 1年以上
        other: "%{count}年以上"
      x_seconds:
        one: 1秒
        other: "%{count}秒"
      x_minutes:
        one: 1分
        other: "%{count}分"
      x_days:
        one: 1日
        other: "%{count}日"
      x_months:
        one: 1ヶ月
        other: "%{count}ヶ月"
      x_years:
        one: 1年
        other: "%{count}年"

  # ActiveRecordモデル名・属性・バリデーションメッセージの翻訳
  activerecord:
    models:
      thread: "交換日記"
      post: "投稿"
      user: "ユーザー"
      membership: "メンバーシップ"
      subscription: "購読"
    attributes:
      thread:
        title: "タイトル"
        description: "説明"
        slug: "URL"
        thumbnail: "カバーアート"
      post:
        title: "タイトル"
        body: "本文"
        thumbnail: "画像"
      user:
        username: "ユーザー名"
        display_name: "表示名"
        bio: "自己紹介"
      membership:
        user_id: "ユーザー"
      subscription:
        user_id: "ユーザー"
    errors:
      messages:
        blank: "を入力してください"
        too_short: "は%{count}文字以上で入力してください"
        too_long: "は%{count}文字以内で入力してください"
        taken: "はすでに使用されています"
        invalid: "は不正な値です"
        confirmation: "と%{attribute}の入力が一致しません"
        accepted: "を受諾してください"
        empty: "を入力してください"
        present: "は入力しないでください"
        not_a_number: "は数値で入力してください"
        not_an_integer: "は整数で入力してください"
        greater_than: "は%{count}より大きい値にしてください"
        greater_than_or_equal_to: "は%{count}以上の値にしてください"
        equal_to: "は%{count}にしてください"
        less_than: "は%{count}より小さい値にしてください"
        less_than_or_equal_to: "は%{count}以下の値にしてください"
        other_than: "は%{count}以外の値にしてください"
        in: "は%{count}の範囲に含めてください"
        odd: "は奇数にしてください"
        even: "は偶数にしてください"
        required: "を入力してください"
      models:
        membership:
          attributes:
            user_id:
              taken: "はすでにこの交換日記のメンバーです"
        subscription:
          attributes:
            user_id:
              taken: "はすでにこの交換日記を購読しています"
